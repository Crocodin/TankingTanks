# LOGGING - Test only
logging.level.root=WARN
logging.level.ubb.dbsm=INFO
logging.file.name=logs/test.log
logging.pattern.console=%d{HH:mm:ss} %-5level - %msg%n
logging.pattern.file=%d{HH:mm:ss} %-5level %logger{36} - %msg%n


# DATABASE CONNECTION
spring.datasource.url=jdbc:sqlserver://CROCODIN-PC:1433;databaseName=TankingTanksMini;encrypt=true;trustServerCertificate=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# HIKARI CONNECTION POOL
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA / HIBERNATE
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# EhCache
spring.cache.type=jcache
spring.cache.jcache.config=classpath:ehcache.xml
spring.cache.jcache.provider=org.ehcache.jsr107.EhcacheCachingProvider

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/master.xml